<!DOCTYPE html>
<html>
<head>
    <title>IP, Time, and Location</title>

<body>

    <style>
        #ip, #time, #location {
            text-align: center;
            margin: 10px;
            }           

    </style>

    <SCript>
        
    </SCript>
    <div id="ip"></div>
    <div id="time"></div>
    <div id="location"></div>
    <script>
        function displayTime() {
    const now = new Date();
    const timeElement = document.getElementById('time');
    timeElement.textContent = now.toLocaleString();
}

function displayLocation() {
    // Replace 'YOUR_API_KEY' with your actual API key
    const apiKey = 'YOUR_API_KEY';
    const locationElement = document.getElementById('location');

    fetch(`https://api.ipify.org?format=json`)
        .then(response => response.json())
        .then(data => {
            const ip = data.ip;
            locationElement.textContent = `Your IP: ${ip}`;

            // Use a geolocation service (e.g., https://ipgeolocation.abstractapi.com/) to get location based on IP
            // Replace 'YOUR_API_KEY' with your actual API key
            fetch(`https://ipgeolocation.abstractapi.com/v1/?api_key=${apiKey}&ip=${ip}`)
                .then(response => response.json())
                .then(locationData => {
                    locationElement.textContent += `\nLocation: ${locationData.city}, ${locationData.country}`;
                })
                .catch(error => {
                    console.error('Error fetching location:', error);
                });
        })
        .catch(error => {
            console.error('Error fetching IP:', error);
        });
}

displayTime();
setInterval(displayTime, 1000); // Update time every second

    </script>
</body>
